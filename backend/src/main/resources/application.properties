spring.application.name=backend
server.port=6754

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recipedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:recipe_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:recipe_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET:a8f3d2c1b0e94567890abcdef1234567890abcdef1234567890abcdef12345678}
jwt.expiration-ms=86400000

admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}
