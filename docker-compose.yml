services:
  postgres:
    image: postgres:16-alpine
    container_name: recipe-postgres
    environment:
      POSTGRES_DB: recipedb
      POSTGRES_USER: recipe_user
      POSTGRES_PASSWORD: recipe_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe_user -d recipedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: recipe-backend
    expose:
      - "6754"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/recipedb
      - SPRING_DATASOURCE_USERNAME=recipe_user
      - SPRING_DATASOURCE_PASSWORD=recipe_pass
      - JWT_SECRET=a8f3d2c1b0e94567890abcdef1234567890abcdef1234567890abcdef12345678
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    container_name: recipe-frontend
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: recipe-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
